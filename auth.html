<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FindIt AI - Sign In / Register</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #111827;
      --bg-card: #1a1f2e;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --accent: #62d2ff;
      --accent3: #10b981;
      --border: #1e293b;
      --danger: #ef4444;
      --radius: 16px;
      --radius-sm: 10px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .auth-wrapper {
      width: 100%;
      max-width: 440px;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 2rem;
      text-decoration: none;
      color: var(--text-primary);
      font-weight: 800;
      font-size: 1.5rem;
    }

    .logo-dot {
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(98, 210, 255, 0.4); }
      50% { box-shadow: 0 0 0 12px rgba(98, 210, 255, 0); }
    }

    .auth-container {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
    }

    /* Slide Toggle */
    .slide-toggle {
      display: flex;
      background: var(--bg-secondary);
      padding: 5px;
      margin: 1.5rem 1.5rem 0;
      border-radius: 50px;
      position: relative;
    }

    .slide-toggle::before {
      content: '';
      position: absolute;
      top: 5px;
      left: 5px;
      width: calc(50% - 5px);
      height: calc(100% - 10px);
      background: var(--accent);
      border-radius: 50px;
      transition: var(--transition);
      z-index: 0;
    }

    .slide-toggle.register-mode::before {
      left: 50%;
    }

    .toggle-btn {
      flex: 1;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: var(--transition);
      position: relative;
      z-index: 1;
      border: none;
      background: transparent;
      color: var(--text-secondary);
    }

    .toggle-btn.active {
      color: #0a0a0a;
    }

    /* Slide Panels */
    .slide-panels {
      position: relative;
      overflow: hidden;
      min-height: 420px;
    }

    .slide-panel {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 2rem 1.5rem;
      transition: var(--transition);
      opacity: 0;
      transform: translateX(100%);
    }

    .slide-panel.active {
      position: relative;
      opacity: 1;
      transform: translateX(0);
    }

    .slide-panel.exit-left {
      opacity: 0;
      transform: translateX(-100%);
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      transition: var(--transition);
      outline: none;
    }

    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(98,210,255,0.1);
    }

    .btn {
      padding: 12px 24px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.95rem;
      border: none;
      cursor: pointer;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
    }

    .btn-primary {
      background: var(--accent);
      color: #0a0a0a;
    }
    .btn-primary:hover {
      background: #7dd8ff;
      transform: translateY(-1px);
    }

    .btn-google {
      background: #ffffff;
      color: #1f2937;
      border: 1px solid #d1d5db;
    }
    .btn-google:hover {
      background: #f3f4f6;
      transform: translateY(-1px);
    }
    .btn-google i {
      color: #4285f4;
      font-size: 1.1rem;
    }

    .divider {
      text-align: center;
      margin: 1.5rem 0;
      color: var(--text-secondary);
      font-size: 0.85rem;
      position: relative;
    }

    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 35%;
      height: 1px;
      background: var(--border);
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .forgot-link {
      text-align: right;
      margin-bottom: 1rem;
    }
    .forgot-link a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.85rem;
      transition: var(--transition);
    }
    .forgot-link a:hover {
      text-decoration: underline;
    }

    .terms-text {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.8rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .terms-text a {
      color: var(--accent);
      text-decoration: none;
    }
    .terms-text a:hover {
      text-decoration: underline;
    }

    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 3000;
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 1rem 1.5rem;
      border-radius: var(--radius-sm);
      display: none;
      align-items: center;
      gap: 10px;
      animation: slideIn 0.3s ease;
    }

    .toast.show { display: flex; }
    .toast.success { border-left: 3px solid var(--accent3); }
    .toast.error { border-left: 3px solid var(--danger); }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .back-link {
      text-align: center;
      margin-top: 1.5rem;
    }
    .back-link a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.85rem;
      transition: var(--transition);
    }
    .back-link a:hover { color: var(--accent); }

    /* Loading spinner for buttons */
    .btn-loading {
      pointer-events: none;
      opacity: 0.7;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    .btn-loading .spinner { display: inline-block; }
    .btn-loading .btn-text { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Toast Notification -->
  <div id="toast" class="toast">
    <i class="fas"></i>
    <span id="toastMsg"></span>
  </div>

  <div class="auth-wrapper">
    <!-- Logo -->
    <a href="index.html" class="logo">
      <div class="logo-dot"></div> FindIt AI
    </a>

    <!-- Auth Container -->
    <div class="auth-container">
      <!-- Slide Toggle -->
      <div class="slide-toggle" id="slideToggle">
        <button class="toggle-btn active" onclick="switchPanel('login')">Sign In</button>
        <button class="toggle-btn" onclick="switchPanel('register')">Register</button>
      </div>

      <!-- Slide Panels -->
      <div class="slide-panels">
        <!-- ========== LOGIN PANEL ========== -->
        <div class="slide-panel active" id="loginPanel">
          <!-- Google Sign-In Button -->
          <button class="btn btn-google" onclick="handleGoogleSignIn()" id="googleSignInBtn">
            <i class="fab fa-google"></i>
            <span class="btn-text">Continue with Google</span>
            <span class="spinner"></span>
          </button>

          <div class="divider">or sign in with email</div>

          <!-- Email Login Form -->
          <form onsubmit="handleLogin(event)" id="loginForm">
            <div class="form-group">
              <label>Email</label>
              <input type="email" id="loginEmail" required placeholder="you@example.com">
            </div>
            <div class="form-group">
              <label>Password</label>
              <input type="password" id="loginPassword" required placeholder="••••••••">
            </div>
            <div class="forgot-link">
              <a href="#" onclick="showToast('Please contact support to reset your password.', 'error')">Forgot password?</a>
            </div>
            <button type="submit" class="btn btn-primary" id="loginSubmitBtn">
              <i class="fas fa-sign-in-alt"></i>
              <span class="btn-text">Sign In</span>
              <span class="spinner"></span>
            </button>
          </form>
        </div>

        <!-- ========== REGISTER PANEL ========== -->
        <div class="slide-panel" id="registerPanel">
          <!-- Google Sign-Up Button -->
          <button class="btn btn-google" onclick="handleGoogleSignIn()" id="googleRegisterBtn">
            <i class="fab fa-google"></i>
            <span class="btn-text">Sign up with Google</span>
            <span class="spinner"></span>
          </button>

          <div class="divider">or register with email</div>

          <!-- Email Register Form -->
          <form onsubmit="handleRegister(event)" id="registerForm">
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" id="regName" required placeholder="John Doe">
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" id="regEmail" required placeholder="you@example.com">
            </div>
            <div class="form-group">
              <label>Password</label>
              <input type="password" id="regPassword" required placeholder="Min 6 characters" minlength="6">
            </div>
            <div class="form-group">
              <label>Confirm Password</label>
              <input type="password" id="regConfirm" required placeholder="Repeat password" minlength="6">
            </div>
            <button type="submit" class="btn btn-primary" id="registerSubmitBtn">
              <i class="fas fa-user-plus"></i>
              <span class="btn-text">Create Account</span>
              <span class="spinner"></span>
            </button>
          </form>

          <p class="terms-text">
            By registering you agree to our<br>
            <a href="#">Terms of Service</a> & <a href="#">Privacy Policy</a>
          </p>
        </div>
      </div>
    </div>

    <!-- Back to Home -->
    <div class="back-link">
      <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { 
      getAuth, 
      createUserWithEmailAndPassword, 
      signInWithEmailAndPassword, 
      signInWithPopup, 
      GoogleAuthProvider,
      updateProfile,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyC9WrnjHyTAgB0NZ6psL02S9qMn87LEKQg",
      authDomain: "finditai-2514e.firebaseapp.com",
      projectId: "finditai-2514e",
      storageBucket: "finditai-2514e.firebasestorage.app",
      messagingSenderId: "811813057487",
      appId: "1:811813057487:web:2493893af27b0533b4d8ba",
      measurementId: "G-XT861F9C1P"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const googleProvider = new GoogleAuthProvider();

    // Configure Google provider
    googleProvider.setCustomParameters({
      prompt: 'select_account'
    });

    // ============ TOAST NOTIFICATION ============
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.className = `toast ${type} show`;
      t.querySelector('i').className = type === 'success' 
        ? 'fas fa-check-circle' 
        : 'fas fa-exclamation-circle';
      document.getElementById('toastMsg').textContent = msg;
      
      // Auto hide after 4 seconds
      setTimeout(() => t.classList.remove('show'), 4000);
    }

    // ============ PANEL SWITCHING ============
    window.switchPanel = (panel) => {
      const toggle = document.getElementById('slideToggle');
      const loginPanel = document.getElementById('loginPanel');
      const registerPanel = document.getElementById('registerPanel');
      const buttons = toggle.querySelectorAll('.toggle-btn');

      if (panel === 'register') {
        toggle.classList.add('register-mode');
        buttons[0].classList.remove('active');
        buttons[1].classList.add('active');
        loginPanel.classList.remove('active');
        loginPanel.classList.add('exit-left');
        registerPanel.classList.add('active');
      } else {
        toggle.classList.remove('register-mode');
        buttons[0].classList.add('active');
        buttons[1].classList.remove('active');
        registerPanel.classList.remove('active');
        loginPanel.classList.remove('exit-left');
        loginPanel.classList.add('active');
      }
    };

    // Check URL hash for direct register access
    if (window.location.hash === '#register') {
      setTimeout(() => switchPanel('register'), 100);
    }

    // ============ GOOGLE SIGN-IN ============
    window.handleGoogleSignIn = async () => {
      // Show loading on both Google buttons
      const googleBtns = document.querySelectorAll('.btn-google');
      googleBtns.forEach(btn => btn.classList.add('btn-loading'));

      try {
        const result = await signInWithPopup(auth, googleProvider);
        const user = result.user;
        
        showToast(`Welcome${user.displayName ? ', ' + user.displayName : ''}!`);
        
        // Redirect to dashboard after short delay
        setTimeout(() => {
          window.location.href = 'user.html';
        }, 1000);
        
      } catch (error) {
        console.error('Google Sign-In Error:', error);
        
        // Handle specific errors
        switch (error.code) {
          case 'auth/popup-closed-by-user':
            showToast('Sign-in cancelled. Please try again.', 'error');
            break;
          case 'auth/popup-blocked':
            showToast('Popup was blocked by your browser. Please allow popups.', 'error');
            break;
          case 'auth/cancelled-popup-request':
            // User cancelled, no need to show error
            break;
          case 'auth/account-exists-with-different-credential':
            showToast('An account already exists with this email. Please sign in with email.', 'error');
            break;
          default:
            showToast('Google sign-in failed. Please try again.', 'error');
        }
      } finally {
        // Remove loading state
        googleBtns.forEach(btn => btn.classList.remove('btn-loading'));
      }
    };

    // ============ EMAIL LOGIN ============
    window.handleLogin = async (e) => {
      e.preventDefault();
      
      const submitBtn = document.getElementById('loginSubmitBtn');
      submitBtn.classList.add('btn-loading');
      
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        
        showToast(`Welcome back${user.displayName ? ', ' + user.displayName : ''}!`);
        
        // Redirect to dashboard
        setTimeout(() => {
          window.location.href = 'user.html';
        }, 1000);
        
      } catch (error) {
        console.error('Login Error:', error);
        
        switch (error.code) {
          case 'auth/invalid-email':
            showToast('Invalid email address.', 'error');
            break;
          case 'auth/user-disabled':
            showToast('This account has been disabled.', 'error');
            break;
          case 'auth/user-not-found':
            showToast('No account found with this email. Please register first.', 'error');
            break;
          case 'auth/wrong-password':
            showToast('Incorrect password. Please try again.', 'error');
            break;
          case 'auth/invalid-credential':
            showToast('Invalid email or password.', 'error');
            break;
          case 'auth/too-many-requests':
            showToast('Too many attempts. Please try again later.', 'error');
            break;
          default:
            showToast('Login failed. Please check your credentials.', 'error');
        }
      } finally {
        submitBtn.classList.remove('btn-loading');
      }
    };

    // ============ EMAIL REGISTER ============
    window.handleRegister = async (e) => {
      e.preventDefault();
      
      const submitBtn = document.getElementById('registerSubmitBtn');
      submitBtn.classList.add('btn-loading');
      
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const confirm = document.getElementById('regConfirm').value;
      
      // Validate passwords match
      if (password !== confirm) {
        submitBtn.classList.remove('btn-loading');
        return showToast('Passwords do not match.', 'error');
      }
      
      // Validate password strength
      if (password.length < 6) {
        submitBtn.classList.remove('btn-loading');
        return showToast('Password must be at least 6 characters.', 'error');
      }

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        
        // Update profile with name
        await updateProfile(userCredential.user, {
          displayName: name
        });
        
        showToast('Account created successfully! Welcome to FindIt AI.');
        
        // Redirect to dashboard
        setTimeout(() => {
          window.location.href = 'user.html';
        }, 1500);
        
      } catch (error) {
        console.error('Registration Error:', error);
        
        switch (error.code) {
          case 'auth/email-already-in-use':
            showToast('This email is already registered. Please sign in instead.', 'error');
            // Auto switch to login panel
            setTimeout(() => switchPanel('login'), 1500);
            break;
          case 'auth/invalid-email':
            showToast('Invalid email address.', 'error');
            break;
          case 'auth/operation-not-allowed':
            showToast('Registration is currently disabled.', 'error');
            break;
          case 'auth/weak-password':
            showToast('Password is too weak. Use at least 6 characters.', 'error');
            break;
          default:
            showToast('Registration failed. Please try again.', 'error');
        }
      } finally {
        submitBtn.classList.remove('btn-loading');
      }
    };

    // ============ CHECK EXISTING SESSION ============
    onAuthStateChanged(auth, (user) => {
      if (user) {
        // User is already signed in, redirect to dashboard
        window.location.href = 'user.html';
      }
    });

    console.log('FindIt AI - Auth page ready');
  </script>
</body>
</html>
